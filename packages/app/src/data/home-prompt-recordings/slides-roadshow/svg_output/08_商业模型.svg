<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <g id="background">
    <rect x="0" y="0" width="1280" height="720" fill="#101820"/>
    <path d="M64 124 H1216" stroke="#33516D" stroke-width="1" stroke-opacity="0.55"/>
  </g>
  <g id="header">
    <text x="64" y="70" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="13" fill="#2FBF71" letter-spacing="2">07 · BUSINESS MODEL</text>
    <text x="64" y="111" font-family="Georgia, SimSun, serif" font-size="34" font-weight="700" fill="#F7F4ED">商业模型兼具 SaaS 毛利和数据平台扩展性</text>
  </g>
  <g id="chartArea">
    <!-- chart-plot-area: kpi | cards: 72,174,780,548 -->
    <rect x="72" y="174" width="340" height="162" rx="6" fill="#142235" stroke="#33516D" stroke-width="1"/>
    <text x="102" y="218" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="12" fill="#A9B7C7">TARGET ACV</text>
    <text x="102" y="286" font-family="Georgia, SimSun, serif" font-size="54" font-weight="700" fill="#2FBF71">$48K</text>
    <text x="102" y="316" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" fill="#A9B7C7">平台费 + 席位 + 工作流量</text>
    <rect x="440" y="174" width="340" height="162" rx="6" fill="#142235" stroke="#33516D" stroke-width="1"/>
    <text x="470" y="218" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="12" fill="#A9B7C7">GROSS MARGIN</text>
    <text x="470" y="286" font-family="Georgia, SimSun, serif" font-size="54" font-weight="700" fill="#F7F4ED">82%</text>
    <text x="470" y="316" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" fill="#A9B7C7">软件毛利，服务用于导入期</text>
    <rect x="72" y="376" width="340" height="162" rx="6" fill="#142235" stroke="#33516D" stroke-width="1"/>
    <text x="102" y="420" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="12" fill="#A9B7C7">PAYBACK</text>
    <text x="102" y="488" font-family="Georgia, SimSun, serif" font-size="54" font-weight="700" fill="#7B61FF">11 月</text>
    <text x="102" y="518" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" fill="#A9B7C7">销售回本周期目标</text>
    <rect x="440" y="376" width="340" height="162" rx="6" fill="#142235" stroke="#33516D" stroke-width="1"/>
    <text x="470" y="420" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="12" fill="#A9B7C7">NRR TARGET</text>
    <text x="470" y="488" font-family="Georgia, SimSun, serif" font-size="54" font-weight="700" fill="#2FBF71">118%</text>
    <text x="470" y="518" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" fill="#A9B7C7">多团队扩展与用量增长</text>
  </g>
  <g id="pricing-bridge">
    <rect x="828" y="174" width="388" height="364" rx="6" fill="#142235" stroke="#33516D" stroke-width="1"/>
    <text x="860" y="220" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="12" fill="#A9B7C7">PRICING LOGIC</text>
    <use data-icon="tabler-outline/cash" x="860" y="258" width="36" height="36" fill="#2FBF71" stroke-width="2"/>
    <text x="914" y="284" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="19" fill="#F7F4ED">平台订阅锁定基础预算</text>
    <use data-icon="tabler-outline/users" x="860" y="336" width="36" height="36" fill="#7B61FF" stroke-width="2"/>
    <text x="914" y="362" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="19" fill="#F7F4ED">席位扩展覆盖多部门采用</text>
    <use data-icon="tabler-outline/route" x="860" y="414" width="36" height="36" fill="#2FBF71" stroke-width="2"/>
    <text x="914" y="440" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="19" fill="#F7F4ED">工作流量跟随业务动作增长</text>
    <rect x="860" y="486" width="300" height="1" fill="#33516D"/>
    <text x="860" y="524" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" fill="#A9B7C7">模型的核心是让客户使用越深，收入越自然扩展。</text>
  </g>
  <g id="footer">
    <text x="64" y="670" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="11" fill="#A9B7C7">P08 · 财务指标为目标模型，可替换为实际 cohort 和会计口径</text>
  </g>
</svg>
