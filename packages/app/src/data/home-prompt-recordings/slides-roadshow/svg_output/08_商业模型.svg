  <defs><style>.mono{font-family:Consolas,"Courier New",monospace}.serif{font-family:Georgia,SimSun,serif}.sans{font-family:"Microsoft YaHei",Arial,sans-serif}</style></defs>
  <rect width="1280" height="720" fill="#101820"/>
