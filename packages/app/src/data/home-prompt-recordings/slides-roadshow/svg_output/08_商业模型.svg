  <text x="64" y="111" class="serif" font-size="34" font-weight="700" fill="#F7F4ED">商业模型兼具 SaaS 毛利和数据平台扩展性</text>
  <g>
    <rect x="72" y="174" width="340" height="162" rx="8" fill="#142235" stroke="#33516D"/><text x="102" y="218" class="mono" font-size="12" fill="#A9B7C7">TARGET ACV</text><text x="102" y="286" class="serif" font-size="54" font-weight="700" fill="#2FBF71">$48K</text><text x="102" y="316" class="sans" font-size="16" fill="#A9B7C7">平台费 + 席位 + 工作流量</text>
    <rect x="440" y="174" width="340" height="162" rx="8" fill="#142235" stroke="#33516D"/><text x="470" y="218" class="mono" font-size="12" fill="#A9B7C7">GROSS MARGIN</text><text x="470" y="286" class="serif" font-size="54" font-weight="700" fill="#F7F4ED">82%</text><text x="470" y="316" class="sans" font-size="16" fill="#A9B7C7">软件毛利，服务用于导入期</text>
    <rect x="72" y="376" width="340" height="162" rx="8" fill="#142235" stroke="#33516D"/><text x="102" y="420" class="mono" font-size="12" fill="#A9B7C7">PAYBACK</text><text x="102" y="488" class="serif" font-size="54" font-weight="700" fill="#F2B84B">11 月</text><text x="102" y="518" class="sans" font-size="16" fill="#A9B7C7">销售回本周期目标</text>
    <rect x="440" y="376" width="340" height="162" rx="8" fill="#142235" stroke="#33516D"/><text x="470" y="420" class="mono" font-size="12" fill="#A9B7C7">NRR TARGET</text><text x="470" y="488" class="serif" font-size="54" font-weight="700" fill="#2FBF71">118%</text><text x="470" y="518" class="sans" font-size="16" fill="#A9B7C7">多团队扩展与用量增长</text>
  </g>
  <g>
    <rect x="828" y="174" width="388" height="364" rx="8" fill="#142235" stroke="#33516D"/>
