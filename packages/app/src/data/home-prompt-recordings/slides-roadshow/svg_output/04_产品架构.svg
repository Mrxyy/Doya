<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <marker id="arrowViolet" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#7B61FF"/>
    </marker>
  </defs>
  <g id="background">
    <rect x="0" y="0" width="1280" height="720" fill="#101820"/>
    <path d="M64 124 H1216" stroke="#33516D" stroke-width="1" stroke-opacity="0.55"/>
  </g>
  <g id="header">
    <text x="64" y="70" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="13" fill="#2FBF71" letter-spacing="2">03 · PRODUCT</text>
    <text x="64" y="111" font-family="Georgia, SimSun, serif" font-size="34" font-weight="700" fill="#F7F4ED">我们把指标、洞察和行动编排成一个工作流</text>
  </g>
  <g id="architecture">
    <rect x="86" y="166" width="1108" height="448" rx="6" fill="#142235" stroke="#33516D" stroke-width="1"/>
    <g id="layer-data">
      <rect x="130" y="488" width="1020" height="78" rx="6" fill="#17324D" stroke="#33516D" stroke-width="1"/>
      <use data-icon="tabler-outline/database" x="154" y="511" width="32" height="32" fill="#2FBF71" stroke-width="2"/>
      <text x="204" y="520" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="12" fill="#A9B7C7">LAYER 01</text>
      <text x="204" y="548" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="20" fill="#F7F4ED">连接器层 · 数仓、CRM、产品行为、财务系统</text>
    </g>
    <g id="layer-semantic">
      <rect x="130" y="382" width="1020" height="78" rx="6" fill="#17324D" stroke="#33516D" stroke-width="1"/>
      <use data-icon="tabler-outline/stack" x="154" y="405" width="32" height="32" fill="#7B61FF" stroke-width="2"/>
      <text x="204" y="414" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="12" fill="#A9B7C7">LAYER 02</text>
      <text x="204" y="442" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="20" fill="#F7F4ED">语义指标层 · 指标口径、权限治理、行业模板</text>
    </g>
    <g id="layer-ai">
      <rect x="130" y="276" width="1020" height="78" rx="6" fill="#17324D" stroke="#33516D" stroke-width="1"/>
      <use data-icon="tabler-outline/brain" x="154" y="299" width="32" height="32" fill="#2FBF71" stroke-width="2"/>
      <text x="204" y="308" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="12" fill="#A9B7C7">LAYER 03</text>
      <text x="204" y="336" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="20" fill="#F7F4ED">洞察代理 · 异常解释、归因分析、建议生成</text>
    </g>
    <g id="layer-action">
      <rect x="130" y="204" width="1020" height="48" rx="6" fill="#2FBF71" fill-opacity="0.16" stroke="#2FBF71" stroke-width="1"/>
      <use data-icon="tabler-outline/route" x="154" y="212" width="30" height="30" fill="#2FBF71" stroke-width="2"/>
      <text x="204" y="235" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="20" fill="#F7F4ED">行动编排层 · 推送到 Slack、CRM、工单和增长实验</text>
    </g>
    <line x1="640" y1="488" x2="640" y2="462" stroke="#7B61FF" stroke-width="3" marker-end="url(#arrowViolet)"/>
    <line x1="640" y1="382" x2="640" y2="356" stroke="#7B61FF" stroke-width="3" marker-end="url(#arrowViolet)"/>
    <line x1="640" y1="276" x2="640" y2="254" stroke="#7B61FF" stroke-width="3" marker-end="url(#arrowViolet)"/>
  </g>
  <g id="right-callouts">
    <rect x="866" y="292" width="250" height="42" rx="4" fill="#101820" stroke="#33516D" stroke-width="1"/>
    <text x="888" y="319" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="15" fill="#A9B7C7">从问题发现到动作建议</text>
    <rect x="866" y="398" width="250" height="42" rx="4" fill="#101820" stroke="#33516D" stroke-width="1"/>
    <text x="888" y="425" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="15" fill="#A9B7C7">客户语境沉淀为资产</text>
    <rect x="866" y="504" width="250" height="42" rx="4" fill="#101820" stroke="#33516D" stroke-width="1"/>
    <text x="888" y="531" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="15" fill="#A9B7C7">企业系统接入即价值入口</text>
  </g>
  <g id="footer">
    <text x="64" y="670" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="11" fill="#A9B7C7">P04 · 产品价值不是单点功能，而是一条可治理的业务闭环</text>
  </g>
</svg>
