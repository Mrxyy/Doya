<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="coverScrim" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#101820" stop-opacity="0.96"/>
      <stop offset="48%" stop-color="#101820" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#101820" stop-opacity="0.34"/>
    </linearGradient>
    <radialGradient id="greenGlow" cx="28%" cy="28%" r="55%">
      <stop offset="0%" stop-color="#2FBF71" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#2FBF71" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g id="background">
    <rect x="0" y="0" width="1280" height="720" fill="#101820"/>
    <image href="../images/cover_dashboard.png" x="0" y="0" width="1280" height="720" preserveAspectRatio="xMidYMid slice"/>
    <rect x="0" y="0" width="1280" height="720" fill="url(#coverScrim)"/>
    <rect x="0" y="0" width="1280" height="720" fill="url(#greenGlow)"/>
    <path d="M64 632 H1216" stroke="#33516D" stroke-width="1" stroke-opacity="0.55"/>
  </g>
  <g id="title-block">
    <text x="72" y="92" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="13" fill="#2FBF71" letter-spacing="2">B2B SAAS ANALYTICS PITCH</text>
