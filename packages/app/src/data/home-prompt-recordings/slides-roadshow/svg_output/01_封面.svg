    </text>
  </g>
  <g id="metric-rail">
    <rect x="72" y="476" width="248" height="96" rx="6" fill="#142235" stroke="#33516D" stroke-width="1"/>
    <text x="96" y="512" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="13" fill="#A9B7C7">MARKET SHIFT</text>
    <text x="96" y="550" font-family="Georgia, SimSun, serif" font-size="32" font-weight="700" fill="#2FBF71">决策自动化</text>
    <rect x="348" y="476" width="248" height="96" rx="6" fill="#142235" stroke="#33516D" stroke-width="1"/>
    <text x="372" y="512" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="13" fill="#A9B7C7">BUYER</text>
    <text x="372" y="550" font-family="Georgia, SimSun, serif" font-size="32" font-weight="700" fill="#F7F4ED">CFO + RevOps</text>
    <rect x="624" y="476" width="248" height="96" rx="6" fill="#142235" stroke="#33516D" stroke-width="1"/>
    <text x="648" y="512" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="13" fill="#A9B7C7">MOTION</text>
    <text x="648" y="550" font-family="Georgia, SimSun, serif" font-size="32" font-weight="700" fill="#7B61FF">PLG to Enterprise</text>
  </g>
  <g id="footer">
