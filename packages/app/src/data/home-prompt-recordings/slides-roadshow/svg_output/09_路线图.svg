    <text x="434" y="404" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="17" fill="#F7F4ED">企业销售复制</text>
    <text x="618" y="322" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="13" fill="#A9B7C7">M11-M14</text>
    <text x="602" y="404" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="17" fill="#F7F4ED">客户成功体系</text>
