    <text x="90" y="414" class="sans" font-size="19" fill="#A9B7C7"><tspan x="90" dy="0">每一次指标定义、洞察确认和业务动作，</tspan><tspan x="90" dy="30">都会让平台更理解企业如何经营。</tspan></text>
