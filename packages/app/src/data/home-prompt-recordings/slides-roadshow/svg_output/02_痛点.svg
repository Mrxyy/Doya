    <text x="646" y="356" text-anchor="middle" class="serif" font-size="27" font-weight="700" fill="#F7F4ED">行动断点</text>
    <text x="646" y="389" text-anchor="middle" class="mono" font-size="13" fill="#A9B7C7">INSIGHT TO ACTION GAP</text>
