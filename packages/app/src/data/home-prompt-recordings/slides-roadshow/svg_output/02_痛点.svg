    <text x="790" y="314" class="sans" font-size="17" fill="#F7F4ED">解释原因</text>
    <text x="738" y="554" class="sans" font-size="17" fill="#F7F4ED">推动动作</text>
    <text x="392" y="472" class="sans" font-size="17" fill="#F2B84B">复盘缺失</text>
