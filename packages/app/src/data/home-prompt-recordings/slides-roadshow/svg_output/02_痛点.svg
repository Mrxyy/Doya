<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2FBF71"/>
    </marker>
  </defs>
  <g id="background">
    <rect x="0" y="0" width="1280" height="720" fill="#101820"/>
    <path d="M0 610 C220 560 330 655 560 606 C805 554 966 602 1280 546" fill="none" stroke="#22364D" stroke-width="1"/>
    <path d="M64 124 H1216" stroke="#33516D" stroke-width="1" stroke-opacity="0.55"/>
  </g>
  <g id="header">
    <text x="64" y="70" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="13" fill="#2FBF71" letter-spacing="2">01 · WHY NOW</text>
    <text x="64" y="111" font-family="Georgia, SimSun, serif" font-size="34" font-weight="700" fill="#F7F4ED">痛点不是缺数据，而是决策闭环断了</text>
  </g>
  <g id="left-stack">
    <rect x="72" y="170" width="380" height="402" rx="6" fill="#142235" stroke="#33516D" stroke-width="1"/>
    <text x="104" y="216" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="13" fill="#A9B7C7">CURRENT STACK</text>
    <use data-icon="tabler-outline/database" x="104" y="252" width="36" height="36" fill="#7B61FF" stroke-width="2"/>
    <text x="160" y="278" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="20" fill="#F7F4ED">数仓和数据湖</text>
    <use data-icon="tabler-outline/chart-line" x="104" y="332" width="36" height="36" fill="#7B61FF" stroke-width="2"/>
    <text x="160" y="358" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="20" fill="#F7F4ED">BI 看板和报表</text>
    <use data-icon="tabler-outline/users" x="104" y="412" width="36" height="36" fill="#7B61FF" stroke-width="2"/>
    <text x="160" y="438" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="20" fill="#F7F4ED">分析师和业务团队</text>
    <text x="104" y="516" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="17" fill="#A9B7C7">
      <tspan x="104" dy="0">系统都在，但问题仍靠会议、截图</tspan>
      <tspan x="104" dy="26">和人工解释流转，行动没有闭环。</tspan>
    </text>
  </g>
  <g id="broken-loop">
    <circle cx="646" cy="368" r="168" fill="none" stroke="#33516D" stroke-width="2" stroke-dasharray="9 10"/>
    <path d="M534 248 C622 166 784 206 810 330" fill="none" stroke="#2FBF71" stroke-width="4" marker-end="url(#arrowGreen)"/>
    <path d="M785 466 C690 560 536 514 493 398" fill="none" stroke="#FF6B6B" stroke-width="4" stroke-dasharray="8 9"/>
    <circle cx="646" cy="368" r="78" fill="#17324D" stroke="#7B61FF" stroke-width="2"/>
    <text x="646" y="356" text-anchor="middle" font-family="Georgia, SimSun, serif" font-size="27" font-weight="700" fill="#F7F4ED">行动断点</text>
    <text x="646" y="389" text-anchor="middle" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="15" fill="#A9B7C7">INSIGHT TO ACTION GAP</text>
    <text x="468" y="214" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="17" fill="#F7F4ED">发现问题</text>
    <text x="790" y="314" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="17" fill="#F7F4ED">解释原因</text>
    <text x="738" y="554" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="17" fill="#F7F4ED">推动动作</text>
    <text x="392" y="472" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="17" fill="#FF6B6B">复盘缺失</text>
  </g>
  <g id="right-proof">
    <rect x="912" y="170" width="296" height="402" rx="6" fill="#142235" stroke="#33516D" stroke-width="1"/>
    <text x="944" y="216" font-family="Consolas, &quot;Courier New&quot;, monospace" font-size="13" fill="#A9B7C7">INVESTOR READ</text>
    <text x="944" y="278" font-family="Georgia, SimSun, serif" font-size="42" font-weight="700" fill="#2FBF71">3 个断点</text>
    <text x="944" y="330" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="18" fill="#F7F4ED">指标争议</text>
    <text x="944" y="382" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="18" fill="#F7F4ED">洞察等待</text>
    <text x="944" y="434" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="18" fill="#F7F4ED">行动不可追踪</text>
    <rect x="944" y="480" width="208" height="1" fill="#33516D"/>
    <text x="944" y="522" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="16" fill="#A9B7C7">
      <tspan x="944" dy="0">机会不在替代 BI，</tspan>
      <tspan x="944" dy="24">而在补上决策系统的</tspan>
      <tspan x="944" dy="24">最后一公里。</tspan>
    </text>
  </g>
  <g id="footer">
    <text x="64" y="670" font-family="&quot;Microsoft YaHei&quot;, Arial, sans-serif" font-size="11" fill="#A9B7C7">P02 · 数据栈成熟反而暴露出行动闭环的缺口</text>
  </g>
</svg>
