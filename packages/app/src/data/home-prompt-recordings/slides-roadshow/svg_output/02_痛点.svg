  <text x="64" y="111" class="serif" font-size="34" font-weight="700" fill="#F7F4ED">痛点不是缺数据，而是决策闭环断了</text>
  <g>
    <rect x="72" y="170" width="380" height="402" rx="8" fill="#142235" stroke="#33516D"/>
