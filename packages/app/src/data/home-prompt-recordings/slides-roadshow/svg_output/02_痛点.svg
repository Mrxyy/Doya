      <tspan x="944" dy="24">而在补上决策系统的</tspan>
      <tspan x="944" dy="24">最后一公里。</tspan>
    </text>
  </g>
  <text x="64" y="670" class="sans" font-size="11" fill="#A9B7C7">P02 · 数据栈成熟反而暴露出行动闭环的缺口</text>
