npmRebuild: false
appId: sh.doya.desktop
productName: Doya
executableName: Doya
afterPack: ./scripts/after-pack.js
afterSign: ./scripts/after-sign.js
directories:
  output: release
files:
  - dist/**/*
  - node_modules/@getdoya/cli/bin/**/*
  - node_modules/@getdoya/cli/dist/**/*
  - node_modules/@getdoya/cli/package.json
  - node_modules/@getdoya/client/dist/**/*
  - node_modules/@getdoya/client/package.json
  - node_modules/@getdoya/highlight/dist/**/*
  - node_modules/@getdoya/highlight/package.json
  - node_modules/@getdoya/protocol/dist/**/*
  - node_modules/@getdoya/protocol/package.json
  - node_modules/@getdoya/relay/dist/**/*
  - node_modules/@getdoya/relay/package.json
  - node_modules/@getdoya/server/dist/**/*
  - node_modules/@getdoya/server/package.json
  - "!**/*.map"
  - "!node_modules/@getdoya/*/src/**"
  - "!node_modules/@getdoya/**/*.test.*"
  - "!node_modules/@getdoya/**/*.spec.*"
asarUnpack:
  - dist/daemon/node-entrypoint-runner.js
  - node_modules/@getdoya/server/dist/server/terminal/shell-integration/**/*
extraResources:
  - from: ../app/dist
    to: app-dist
  - from: ../../skills
    to: skills
publish:
  provider: github
  owner: getdoya
  repo: doya
mac:
  artifactName: "Doya-${version}-${arch}.${ext}"
  category: public.app-category.developer-tools
  icon: assets/icon.icns
  hardenedRuntime: true
  notarize: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.inherit.plist
  extraResources:
    - from: bin/doya
      to: bin/doya
  target:
    - dmg
    - zip
linux:
  category: Development
  icon: assets
  artifactName: "Doya-${version}-${arch}.${ext}"
  maintainer: "Mohamed Boudra <hello@moboudra.com>"
  vendor: "Doya"
  extraResources:
    - from: bin/doya
      to: bin/doya
  target:
    - AppImage
    - deb
    - rpm
    - tar.gz
win:
  artifactName: "Doya-Setup-${version}-${arch}.${ext}"
  icon: assets/icon.ico
  extraResources:
    - from: bin/doya.cmd
      to: bin/doya.cmd
  target:
    - target: nsis
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
