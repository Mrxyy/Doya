<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="page_title">PPT Master - Live Preview</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div id="app">
      <div id="panel-center">
        <div id="slide-nav">
          <div class="slide-nav-side slide-nav-side-left">
            <button
              id="slide-list-toggle"
              class="nav-btn slide-list-toggle"
              type="button"
              aria-expanded="false"
              data-i18n-title="slides_list_toggle"
            >
              <span class="slide-list-toggle-icon" aria-hidden="true">☰</span>
            </button>
          </div>
          <div class="slide-nav-main">
            <button id="nav-first" class="nav-btn" type="button" data-i18n-title="nav_first">
              &laquo;
            </button>
            <button id="nav-prev" class="nav-btn" type="button" data-i18n-title="nav_prev">
              &lsaquo;
            </button>
            <div id="nav-label">
              <span id="nav-counter">— / —</span>
              <span id="nav-name"></span>
            </div>
            <button id="nav-next" class="nav-btn" type="button" data-i18n-title="nav_next">
              &rsaquo;
            </button>
            <button id="nav-last" class="nav-btn" type="button" data-i18n-title="nav_last">
              &raquo;
            </button>
          </div>
          <div class="slide-nav-side slide-nav-side-right">
            <button
              id="inspector-sidebar-toggle"
              class="nav-btn inspector-sidebar-toggle"
              type="button"
              aria-expanded="false"
              data-i18n-title="inspector_sidebar_expand"
            >
              <span class="inspector-sidebar-icon" aria-hidden="true">&#9998;</span>
            </button>
          </div>
        </div>
        <div id="slide-list-popover" class="slide-list-popover">
          <div class="panel-header" data-i18n="panel_slides">Slides</div>
          <div id="slide-list"></div>
        </div>
        <div id="svg-container">
          <div id="rubber-band-overlay"></div>
          <div id="svg-placeholder" data-i18n="placeholder_select_slide">
            Select a slide to begin
          </div>
          <div id="svg-content" style="display: none"></div>
        </div>
      </div>
      <div id="panel-right">
        <button id="btn-lang-toggle" class="btn-lang-toggle" title="Switch language">中</button>
        <div class="panel-header panel-header-with-action">
          <span data-i18n="panel_annotations">Edit</span>
          <button
            id="annotation-visibility-toggle"
            class="annotation-visibility-toggle"
            type="button"
            aria-pressed="true"
            data-i18n-title="tooltip_annotations_hide"
          >
            <span class="annotation-visibility-icon" aria-hidden="true"></span>
          </button>
        </div>
        <div id="selection-info">
          <div class="section-label" data-i18n="label_selected_element">Selected element</div>
          <div id="selected-element" class="empty" data-i18n="empty_selected_element">
            Click an element on the slide to select it
          </div>
          <div id="element-props" style="display: none"></div>
        </div>
        <div id="annotation-input" style="display: none">
          <div class="section-label" data-i18n="label_edit_instruction">Edit instruction</div>
          <textarea
            id="annotation-text"
            data-i18n-placeholder="placeholder_annotation"
            placeholder="Describe how the AI should modify this element..."
          ></textarea>
          <button id="btn-add-annotation" data-i18n="btn_add_annotation">Add annotation</button>
        </div>
        <div id="annotation-list">
          <div id="annotations"></div>
        </div>
        <div id="preview-actions">
          <button id="btn-undo" class="btn-undo" data-i18n="btn_undo" disabled>Undo</button>
          <button id="btn-save" class="btn-save" data-i18n="btn_submit_annotations">
            Submit annotations
          </button>
          <button id="btn-exit-preview" class="btn-exit-preview" data-i18n="btn_exit_preview">
            Exit preview
          </button>
        </div>
      </div>
    </div>
    <div id="modal-overlay" style="display: none">
      <div id="modal">
        <div id="modal-message"></div>
        <div id="modal-buttons">
          <button id="modal-confirm" data-i18n="modal_submit">Submit</button>
          <button id="modal-cancel" data-i18n="modal_cancel">Cancel</button>
        </div>
      </div>
    </div>
    <script src="/static/app.js"></script>
  </body>
</html>
