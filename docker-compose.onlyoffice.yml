name: doya-onlyoffice

services:
  onlyoffice-document-server:
    container_name: doya-onlyoffice-document-server
    image: onlyoffice/documentserver:latest
    restart: unless-stopped
    ports:
      - "8082:80"
    environment:
      JWT_ENABLED: "false"
      SECURE_LINK_SECRET: "doya-onlyoffice-local"
    volumes:
      - ./packages/server/docker/onlyoffice-entrypoint.sh:/usr/local/bin/doya-onlyoffice-entrypoint.sh:ro
      - ./packages/server/docker/onlyoffice-local.json:/etc/onlyoffice/documentserver/doya-local-template.json:ro
    entrypoint:
      - /bin/bash
      - /usr/local/bin/doya-onlyoffice-entrypoint.sh
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - onlyoffice

networks:
  onlyoffice:
    name: doya-onlyoffice
