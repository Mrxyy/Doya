name: doya

services:
  server:
    image: ${DOYA_SERVER_IMAGE:-jadenxiong/doya-server:latest}
    build:
      context: .
      target: server
      args:
        EXPO_PUBLIC_LOCAL_DAEMON: ${DOYA_PUBLIC_DAEMON-localhost:6767}
        EXPO_PUBLIC_CONTROL_API_URL: ${DOYA_PUBLIC_CONTROL_API_URL-http://localhost:6777}
        EXPO_PUBLIC_ONLYOFFICE_DOCUMENT_SERVER_URL: ${EXPO_PUBLIC_ONLYOFFICE_DOCUMENT_SERVER_URL-}
    environment:
      DOYA_CORS_ORIGINS: ${DOYA_CORS_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      DOYA_CONTROL_API_URL: http://control:6777
      DOYA_CONTROL_DAEMON_ENDPOINT: ${DOYA_RUNTIME_NODE_ENDPOINT:-http://server:6767}
      DOYA_CONTROL_DAEMON_PUBLIC_ENDPOINT: ${DOYA_RUNTIME_NODE_PUBLIC_ENDPOINT:-}
      DOYA_CONTROL_ENABLED: "1"
      DOYA_CONTROL_TOKEN: ${DOYA_CONTROL_TOKEN:-local-dev-node-registration-token}
      DOYA_HOME: /data/doya
      DOYA_HOSTNAMES: ${DOYA_HOSTNAMES:-localhost,127.0.0.1,server}
      DOYA_LISTEN: 0.0.0.0:6767
      DOYA_RELAY_ENABLED: "0"
      DOYA_SERVER_ID: ${DOYA_RUNTIME_NODE_ID:-local-docker}
      NODE_ENV: production
    ports:
      - "6767:6767"
    restart: unless-stopped
    volumes:
      - doya_home:/data/doya
      - ./workspaces:/workspaces
      - ${DOYA_CODEX_HOME:-/root/.codex}:/root/.codex
      - ${DOYA_CODEX_BIN:-/root/.codex/standalone/releases/0.139.0-x86_64-unknown-linux-musl/bin/codex}:/usr/local/bin/codex:ro

  control:
    image: ${DOYA_CONTROL_IMAGE:-jadenxiong/doya-control:latest}
    build:
      context: .
      target: control
      args:
        EXPO_PUBLIC_LOCAL_DAEMON: ${DOYA_PUBLIC_DAEMON-localhost:6767}
        EXPO_PUBLIC_CONTROL_API_URL: ${DOYA_PUBLIC_CONTROL_API_URL-http://localhost:6777}
        EXPO_PUBLIC_ONLYOFFICE_DOCUMENT_SERVER_URL: ${EXPO_PUBLIC_ONLYOFFICE_DOCUMENT_SERVER_URL-}
    environment:
      DOYA_CONTROL_HOME: /data/control
      DOYA_CONTROL_HOST: 0.0.0.0
      DOYA_CONTROL_NODE_REGISTRATION_TOKEN: ${DOYA_CONTROL_NODE_REGISTRATION_TOKEN:-local-dev-node-registration-token}
      DOYA_CONTROL_PORT: "6777"
      DOYA_SMS_ACCOUNT: ${DOYA_SMS_ACCOUNT:-}
      DOYA_SMS_PASSWORD: ${DOYA_SMS_PASSWORD:-}
      DOYA_SMS_URL: ${DOYA_SMS_URL:-}
      DOYA_PAYMENT_GATEWAY_BASE_URL: ${DOYA_PAYMENT_GATEWAY_BASE_URL:-}
      DOYA_PAYMENT_MERCHANT_ID: ${DOYA_PAYMENT_MERCHANT_ID:-}
      DOYA_PAYMENT_MERCHANT_KEY: ${DOYA_PAYMENT_MERCHANT_KEY:-}
      DOYA_PAYMENT_NOTIFY_URL: ${DOYA_PAYMENT_NOTIFY_URL:-}
      DOYA_PAYMENT_PUBLIC_BASE_URL: ${DOYA_PAYMENT_PUBLIC_BASE_URL:-}
      DOYA_PAYMENT_RETURN_URL: ${DOYA_PAYMENT_RETURN_URL:-}
      DOYA_CONTROL_AI_GATEWAY_PUBLIC_BASE_URL: ${DOYA_CONTROL_AI_GATEWAY_PUBLIC_BASE_URL:-}
      DOYA_CONTROL_AI_GATEWAY_UPSTREAM_BASE_URL: ${DOYA_CONTROL_AI_GATEWAY_UPSTREAM_BASE_URL:-}
      DOYA_CONTROL_AI_GATEWAY_UPSTREAM_API_KEY: ${DOYA_CONTROL_AI_GATEWAY_UPSTREAM_API_KEY:-}
      NODE_ENV: production
    ports:
      - "6777:6777"
    restart: unless-stopped
    volumes:
      - doya_control_home:/data/control

  app:
    image: ${DOYA_APP_IMAGE:-jadenxiong/doya-app:latest}
    build:
      context: .
      target: app
      args:
        EXPO_PUBLIC_LOCAL_DAEMON: ${DOYA_PUBLIC_DAEMON-localhost:6767}
        EXPO_PUBLIC_CONTROL_API_URL: ${DOYA_PUBLIC_CONTROL_API_URL-http://localhost:6777}
        EXPO_PUBLIC_ONLYOFFICE_DOCUMENT_SERVER_URL: ${EXPO_PUBLIC_ONLYOFFICE_DOCUMENT_SERVER_URL-}
    depends_on:
      - control
      - server
    ports:
      - "8080:80"
    restart: unless-stopped

  desktop-artifacts:
    build:
      context: .
      target: desktop-artifacts
    profiles:
      - release
    restart: "no"
    volumes:
      - /opt/doya/downloads/desktop:/downloads/desktop

  runtime-node-register:
    image: ${DOYA_SERVER_IMAGE:-jadenxiong/doya-server:latest}
    depends_on:
      - control
      - server
    environment:
      DOYA_CONTROL_INTERNAL_URL: http://control:6777
      DOYA_CONTROL_NODE_REGISTRATION_TOKEN: ${DOYA_CONTROL_NODE_REGISTRATION_TOKEN:-local-dev-node-registration-token}
      DOYA_RUNTIME_NODE_ENDPOINT: ${DOYA_RUNTIME_NODE_ENDPOINT:-http://server:6767}
      DOYA_RUNTIME_NODE_PUBLIC_ENDPOINT: ${DOYA_RUNTIME_NODE_PUBLIC_ENDPOINT:-}
      DOYA_RUNTIME_NODE_HOME: /data/doya
      DOYA_RUNTIME_NODE_ID: ${DOYA_RUNTIME_NODE_ID:-local-docker}
    command: >
      node -e "
      const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
      async function post(path, body, headers = {}) {
        const response = await fetch(process.env.DOYA_CONTROL_INTERNAL_URL + path, {
          method: 'POST',
          headers: { 'content-type': 'application/json', ...headers },
          body: JSON.stringify(body),
        });
        if (!response.ok) {
          throw new Error(path + ' failed with ' + response.status + ': ' + await response.text());
        }
        return await response.json();
      }
      async function main() {
        for (let attempt = 1; attempt <= 30; attempt += 1) {
          try {
            await post('/api/nodes/register', {
              nodeId: process.env.DOYA_RUNTIME_NODE_ID,
              endpoint: process.env.DOYA_RUNTIME_NODE_ENDPOINT,
              publicEndpoint: process.env.DOYA_RUNTIME_NODE_PUBLIC_ENDPOINT || null,
              doyaHome: process.env.DOYA_RUNTIME_NODE_HOME,
              status: 'online',
            }, {
              authorization: 'Bearer ' + process.env.DOYA_CONTROL_NODE_REGISTRATION_TOKEN,
            });
            break;
          } catch (error) {
            if (attempt === 30) throw error;
            await sleep(1000);
          }
        }
        console.log('Registered runtime node ' + process.env.DOYA_RUNTIME_NODE_ID);
      }
      main().catch((error) => { console.error(error); process.exit(1); });
      "
    restart: "no"

volumes:
  doya_control_home:
  doya_home:
